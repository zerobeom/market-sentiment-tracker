name: Update market data daily

on:
  schedule:
    # 매일 UTC 21:30 실행 = 한국시간(KST) 아침 6:30
    - cron: "30 21 * * *"
  workflow_dispatch: {}   # "Run workflow" 버튼으로 수동 실행도 가능하게

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest market data
        run: python scripts/fetch_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fng.json data/vix.json
          git diff --staged --quiet || git commit -m "chore: update market data $(date -u +'%Y-%m-%d')"
          git push
